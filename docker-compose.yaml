services:  
  dont_email_passwords:
    image: ghcr.io/necrolingus/dont_email_passwords:latest
    restart: unless-stopped
    env_file: 
     - .env
    expose:
      - 3002
    networks:
      - internal_proxy
  mcp:
    image: ghcr.io/necrolingus/dont_email_passwords:latest
    command: ["node", "mcp/index.js"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_PORT: 8090
      API_BASE_URL: ${MCP_API_BASE_URL}
    expose:
      - 8090
    depends_on:
      - dont_email_passwords
    networks:
      - internal_proxy

networks:
  internal_proxy:
    external: true